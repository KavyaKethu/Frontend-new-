<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registration Form</title>
  <style>
    :root {
      --background: #f2f6fb;
      --card: #ffffff;
      --border: #dde5ef;
      --text: #1f2a37;
      --muted: #65758b;
      --primary: #4f7cf3;
      --primary-dark: #3f66d1;
      --danger: #e14f5a;
      --radius: 18px;
      --shadow: 0 20px 60px rgba(31, 42, 55, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top left, rgba(79, 124, 243, 0.15), transparent 25%),
        radial-gradient(circle at bottom right, rgba(79, 124, 243, 0.12), transparent 20%),
        var(--background);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .registration-card {
      width: min(550px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 36px;
    }

    .registration-card h1 {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 2.2vw, 2.5rem);
      letter-spacing: -0.03em;
    }

    .registration-card p {
      margin: 0 0 28px;
      color: var(--muted);
      line-height: 1.7;
    }

    .form-grid {
      display: grid;
      gap: 18px;
    }

    .form-row {
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 0.95rem;
      color: var(--muted);
    }

    input,
    select {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #f8fbff;
      font-size: 1rem;
      color: var(--text);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(79, 124, 243, 0.12);
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 6px;
    }

    .checkbox-group input {
      width: auto;
      margin: 0;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 20px;
    }

    .primary-btn {
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #ffffff;
      padding: 15px 18px;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .primary-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 40px rgba(79, 124, 243, 0.2);
    }

    .secondary-text {
      color: var(--muted);
      font-size: 0.95rem;
      text-align: center;
    }

    .secondary-text a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .secondary-text a:hover {
      text-decoration: underline;
    }

    @media (max-width: 560px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <section class="registration-card">
    <h1>Create your account</h1>
    <p>Join now to manage your profile, access exclusive content, and stay updated with the latest features.</p>

    <form class="form-grid">
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" name="firstName" placeholder="John" required />
        </div>
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" name="lastName" placeholder="Doe" required />
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter password" required />
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter password" required />
        </div>
      </div>

      <div class="form-group">
        <label for="role">Account Type</label>
        <select id="role" name="role" required>
          <option value="">Select account type</option>
          <option value="student">Student</option>
          <option value="professional">Professional</option>
          <option value="business">Business</option>
        </select>
      </div>

      <div class="form-group">
        <label for="bio">Short Bio</label>
        <input type="text" id="bio" name="bio" placeholder="Tell us a little about yourself" />
      </div>

      <div class="form-group checkbox-group">
        <input type="checkbox" id="terms" name="terms" required />
        <label for="terms">I agree to the terms and privacy policy.</label>
      </div>

      <div class="actions">
        <button type="submit" class="primary-btn">Register</button>
        <p class="secondary-text">Already have an account? <a href="#">Sign in</a></p>
      </div>
    </form>
  </section>
</body>
</html>
